[package]
name = "samskara"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
capnp = "0.19"
cozo = { version = "0.7.6", default-features = false, features = ["storage-sqlite", "rayon"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
walkdir = "2.3.3"
ractor = "0.9"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
futures = "0.3"
capnp-rpc = "0.19"

[build-dependencies]
capnpc = "0.19"
